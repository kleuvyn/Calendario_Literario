<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Calendário Literário</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAFAF5; color: #3D3547; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .card { max-width: 420px; width: 90%; background: white; border: 1px solid rgba(74,68,63,.08); border-radius: 28px; padding: 2rem; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); text-align: center; }
      h1 { font-size: 1.85rem; margin: 0 0 1rem; letter-spacing: -0.03em; }
      p { margin: 0 0 1.25rem; line-height: 1.7; color: #59504c; }
      a { display: inline-block; margin-top: 1rem; padding: 0.85rem 1.4rem; border-radius: 999px; background: #8C7B6E; color: #fff; text-decoration: none; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Você está offline</h1>
      <p>O Calendário Literário está sem conexão. Tente novamente quando voltar à internet ou navegue pelas telas já carregadas.</p>
      <a href="/">Voltar para o app</a>
    </div>
  </body>
</html>
